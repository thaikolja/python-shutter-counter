stages:
  - lint
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PYTHON_VERSION: "3.10"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .cache/pip
    - venv/

.before_script_template: &before_script
  - python3 -m venv venv
  - venv/bin/pip install --upgrade pip
  - venv/bin/pip install -e ".[dev]"

lint:
  stage: lint
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - *before_script
  script:
    - venv/bin/ruff check shutter_counter/ tests/
    - venv/bin/ruff format --check shutter_counter/ tests/

test:
  stage: test
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - *before_script
  script:
    - venv/bin/python -m pytest tests/ -v --tb=short
  coverage: '/TOTAL.*\s+(\d+%)/'

build:
  stage: build
  image: python:${PYTHON_VERSION}-slim
  before_script:
    - *before_script
  script:
    - venv/bin/pip install build
    - venv/bin/python -m build
  artifacts:
    paths:
      - dist/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
